<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CNN Timeline 설정</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
      background: #f8f9fa;
    }
    h1 {
      font-size: 18px;
      color: #cc0000;
      margin-bottom: 6px;
    }
    p.desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border 0.15s;
    }
    input:focus {
      border-color: #cc0000;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    #btn-save {
      background: #cc0000;
      color: #fff;
    }
    #btn-save:hover { background: #a80000; }
    #btn-toggle {
      background: #eee;
      color: #555;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #2a8a2a;
      min-height: 18px;
    }
    .note {
      margin-top: 24px;
      padding: 12px 14px;
      background: #fff3cd;
      border-radius: 6px;
      font-size: 12px;
      color: #856404;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>CNN Timeline 설정</h1>
  <p class="desc">Claude API 키를 입력하면 AI 요약 기능이 활성화됩니다.<br>
  입력하지 않으면 기사 앞 5문장을 자동 추출합니다.</p>

  <label for="api-key">Claude API Key</label>
  <input type="password" id="api-key" placeholder="sk-ant-...">
  <div class="row">
    <button id="btn-save">저장</button>
    <button id="btn-toggle">보기/숨기기</button>
  </div>
  <div id="status"></div>

  <div class="note">
    🔒 API 키는 브라우저 로컬 스토리지에만 저장되며 외부로 전송되지 않습니다.<br>
    API 키는 <strong>console.anthropic.com</strong>에서 발급받을 수 있습니다.
  </div>

  <script src="options.js"></script>
</body>
</html>
